# Setup guide — connect your laptop + phone to our activity dashboard

👋 Hey! This connects your **Linux laptop** and your **Android phone** to a shared dashboard so we can both see where our time goes (apps + websites). It's the same setup I'm running on mine. Takes **~20 minutes** total.

**What you'll need from me first:** a **Supabase URL** + an **anon key** (I'll send both — just two strings you paste in). Everything writes to one shared database; the dashboard reads from it.

**Three parts:** (1) ActivityWatch on your laptop, (2) a tiny daily upload script, (3) the phone app. At the end your devices auto-appear on my side so I can label them as yours.

---

## 1. Laptop — ActivityWatch on Linux (EndeavourOS / Arch)

### 1a. Install
Use the AUR (cleanest, auto-updates):
```bash
yay -S activitywatch-bin        # or: paru -S activitywatch-bin
aw-qt &                         # launch the tray app
```
(Fallback: download the Linux zip from https://github.com/ActivityWatch/activitywatch/releases and run `./aw-qt`.)
Confirm: open `http://localhost:5600`. Python 3 ships with Arch (`which python3`).

### ⚠️ 1b. Wayland caveat (check this first)
`aw-watcher-window` reads titles via X11. On **Wayland** it often **can't read window titles/app names** — and EndeavourOS with KDE Plasma 6 defaults to Wayland.
- Check: `echo $XDG_SESSION_TYPE` → `x11` (fine) or `wayland` (needs the fix below).
- If Wayland, install the Rust watcher with Wayland support and use it instead:
  ```bash
  yay -S awatcher
  ```
  `awatcher` replaces aw-watcher-window and reports into the same AW server, so the upload script works unchanged. (Alternative: pick an "X11/Xorg" session at the SDDM login screen.)

### 1c. Browser extension
Install the **ActivityWatch Web Watcher** extension in whichever browser you use (Chrome/Chromium/Firefox on Linux all supported). Verify an `aw-watcher-web-*` bucket appears at `localhost:5600`.

### 1d. Autostart
Add `aw-qt` to autostart so it launches on login — create `~/.config/autostart/aw-qt.desktop`:
```ini
[Desktop Entry]
Type=Application
Exec=/full/path/to/aw-qt
X-GNOME-Autostart-enabled=true
Name=ActivityWatch
```

---

## 2. Laptop — the daily upload script (Python)

Save the script Dhruv sends you as `push-activity.py`, next to a `config.json`:
```json
{
  "supabase_url": "https://<PROJECT-REF>.supabase.co",
  "supabase_anon_key": "<ANON-KEY>",
  "aw_base": "http://localhost:5600/api/0",
  "device_id": null
}
```
> After your first successful run, **pin the device_id**: copy the `device_id` the script prints into `config.json` (replacing `null`). ActivityWatch regenerates its id on reinstall, which would otherwise fragment your history.

Test it once: `python3 push-activity.py` → it should print how many events it pushed.

### Schedule it (systemd user timer — handles missed runs)
`~/.config/systemd/user/aw-push.service`:
```ini
[Service]
Type=oneshot
ExecStart=/usr/bin/python3 /home/<you>/activity-pipeline/push-activity.py
```
`~/.config/systemd/user/aw-push.timer`:
```ini
[Unit]
Description=Daily ActivityWatch -> Supabase push
[Timer]
OnCalendar=*-*-* 21:00:00
Persistent=true
[Install]
WantedBy=timers.target
```
Enable it (and let it run without an active login session):
```bash
systemctl --user daemon-reload
systemctl --user enable --now aw-push.timer
loginctl enable-linger $USER
```
`Persistent=true` means it catches up if the laptop was off at 21:00.

---

## 3. Phone — the app (Android)

1. Install **`ActivityPusher.apk`** (Dhruv sends it). Easiest: `adb install ActivityPusher.apk`. Otherwise tap the file and allow "install unknown apps".
2. Open it, paste the **same Supabase URL + anon key**.
3. **Save settings** → **Grant Usage Access** (toggle the app on) → **Upload now (test)**. You should see `OK (201) …`.
4. **Battery settings** so the daily job survives: Settings → Apps → Activity Pusher → Battery → **Unrestricted**, and **lock it in Recents**. (Tell Dhruv your phone brand if unsure — steps differ a bit per brand.)

> Phone captures **app-level** time (e.g. "Chrome 90m"), not which websites — that's a known limitation we're still deciding on.

---

## 4. Supabase — nothing to set up on your side

The database already exists. You just use the **URL + anon key Dhruv sent you** (pasted in step 2 for the laptop and step 3 for the phone). No accounts, no SQL.

Once your laptop and phone each upload once, **your devices automatically appear on Dhruv's side** and he labels them as yours.

---

## 5. Checklist

- [ ] ActivityWatch installed; `localhost:5600` works
- [ ] Wayland vs X11 checked (use `awatcher` if Wayland)
- [ ] Browser extension installed + bucket appears
- [ ] aw-qt autostart added
- [ ] `push-activity.py` + `config.json` in place; first manual run pushes rows
- [ ] systemd timer enabled + linger on
- [ ] Phone app installed, creds entered, Usage Access granted, test upload OK
- [ ] Phone battery set to Unrestricted + locked in Recents
- [ ] Pinned laptop `device_id` in `config.json`
- [ ] Pinged Dhruv that you're set up
