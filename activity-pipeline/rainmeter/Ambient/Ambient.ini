; Ambient — tiny bottom-right desktop widget showing today's Laptop / Phone / Tokens.
; Reads the dashboard's /api/ambient.json (preformatted fields, no math needed).
; SETUP: replace <AMBIENT_TOKEN> below with the real token, then in Rainmeter:
;   Refresh All -> load "Ambient", right-click -> Position -> On Desktop, drag to a corner.
[Rainmeter]
Update=1000
AccurateText=1

[Variables]
; put the real secret token here (do NOT commit it):
URL=https://dashboard-five-beta-46.vercel.app/api/ambient.json?k=<AMBIENT_TOKEN>&person=dhruv
FF=Segoe UI

[mWeb]
Measure=WebParser
URL=#URL#
RegExp=(?siU)"laptop_fmt":"(.*)".*"phone_fmt":"(.*)".*"tokens_fmt":"(.*)".*"cost_fmt":"(.*)"
UpdateRate=60

[mLaptop]
Measure=WebParser
URL=[mWeb]
StringIndex=1

[mPhone]
Measure=WebParser
URL=[mWeb]
StringIndex=2

[mTokens]
Measure=WebParser
URL=[mWeb]
StringIndex=3

[mCost]
Measure=WebParser
URL=[mWeb]
StringIndex=4

[bg]
Meter=Shape
Shape=Rectangle 0,0,212,104,12 | Fill Color 14,16,21,228 | StrokeWidth 1 | Stroke Color 60,70,90,255

[title]
Meter=String
X=16
Y=11
FontFace=#FF#
FontSize=9
FontColor=139,148,167,255
StringStyle=Bold
AntiAlias=1
Text=DHRUV - TODAY

[laptop]
Meter=String
MeasureName=mLaptop
X=16
Y=30
FontFace=#FF#
FontSize=13
FontColor=91,157,255,255
StringStyle=Bold
AntiAlias=1
Text=Laptop   %1

[phone]
Meter=String
MeasureName=mPhone
X=16
Y=52
FontFace=#FF#
FontSize=13
FontColor=246,179,82,255
StringStyle=Bold
AntiAlias=1
Text=Phone    %1

[tokens]
Meter=String
MeasureName=mTokens
MeasureName2=mCost
X=16
Y=74
FontFace=#FF#
FontSize=13
FontColor=110,231,168,255
StringStyle=Bold
AntiAlias=1
Text=Tokens   %1  (%2)
